name: Build Raspberry Pi NixOS image

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "hosts/**"
      - ".github/workflows/build-rpi-image.yml"

concurrency:
  group: build-rpi-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  build-sd-image:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build Raspberry Pi SD image
        run: nix build .#packages.aarch64-linux.sdImage --print-build-logs

      - name: Prepare single artifact file
        id: meta
        run: |
          set -euo pipefail
          mkdir -p dist
          IMG=$(ls -1t result/sd-image/*.img* | head -n1)
          cp "$IMG" dist/rpi-sd-image.img
          echo "img_path=dist/rpi-sd-image.img" >> "$GITHUB_OUTPUT"

      - name: Delete previous artifact versions
        uses: actions/github-script@v7
        with:
          script: |
            const artifactName = 'rpi-sd-image';
            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            for (const artifact of artifacts) {
              if (artifact.name === artifactName) {
                core.info(`Deleting old artifact: ${artifact.name} (id=${artifact.id})`);
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
              }
            }

      - name: Upload SD image artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpi-sd-image
          path: ${{ steps.meta.outputs.img_path }}
          if-no-files-found: error
          overwrite: true
          retention-days: 7
